<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات - متجر باريس للعطور</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .cart-page-container {
            padding-top: 150px;
            min-height: 80vh;
        }
        .cart-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            align-items: start;
        }
        .cart-items-list {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: var(--shadow);
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 20px;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
        }
        .item-details {
            flex: 1;
        }
        .item-details h4 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: var(--secondary-color);
        }
        .item-details p {
            color: var(--primary-color);
            font-weight: bold;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f9f6f0;
            padding: 8px 15px;
            border-radius: 50px;
        }
        .qty-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--secondary-color);
            font-size: 1.1rem;
            transition: var(--transition);
        }
        .qty-btn:hover {
            color: var(--primary-color);
        }
        .remove-btn {
            color: #ff4d4d;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .remove-btn:hover {
            transform: scale(1.2);
        }
        .cart-summary-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 120px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .summary-total {
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.4rem;
            color: var(--secondary-color);
        }
        .checkout-btn {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            border-radius: 15px;
        }
        .empty-cart-msg {
            text-align: center;
            padding: 60px 0;
        }
        .empty-cart-msg i {
            font-size: 5rem;
            color: #eee;
            margin-bottom: 20px;
        }
        @media (max-width: 992px) {
            .cart-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <h1>باريس للعطور</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="products.html">العطور</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="contact.html">اتصل بنا</a></li>
            </ul>
            <div class="cart-icon-container" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <div class="container cart-page-container">
        <h2 class="section-title"><span>حقيبة اختياراتك</span>سلة المشتريات</h2>
        
        <div id="cart-wrapper" class="cart-wrapper" style="display: none;">
            <div class="cart-items-list" id="cart-items-container">
                <!-- المنتجات ستظهر هنا -->
            </div>
            
            <div class="cart-summary-card" id="cart-summary">
                <h3>ملخص الطلب</h3>
                <div class="summary-row" style="margin-top: 20px;">
                    <span>المجموع الفرعي</span>
                    <span id="subtotal">0 ر.س</span>
                </div>
                <div class="summary-row">
                    <span>رسوم التوصيل</span>
                    <span style="color: #25d366;">مجاني</span>
                </div>
                <div class="summary-row summary-total">
                    <span>الإجمالي الكلي</span>
                    <span id="final-total">0 ر.س</span>
                </div>
                <button class="btn checkout-btn" onclick="window.location.href='checkout.html'">إتمام عملية الشراء</button>
                <button class="btn btn-secondary" style="width: 100%; margin-top: 15px; border-color: #eee; color: #666;" onclick="window.location.href='products.html'">مواصلة التسوق</button>
            </div>
        </div>

        <div id="empty-cart" class="empty-cart-msg">
            <i class="fas fa-shopping-basket"></i>
            <h3>سلة المشتريات فارغة حالياً</h3>
            <p style="margin: 15px 0 30px;">يبدو أنك لم تختر عطر أحلامك بعد!</p>
            <a href="products.html" class="btn">استعرض مجموعتنا العطرية</a>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>جميع الحقوق محفوظة &copy; متجر باريس للعطور 2026</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const wrapper = document.getElementById('cart-wrapper');
            const emptyMsg = document.getElementById('empty-cart');
            
            if (cart.length === 0) {
                wrapper.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            wrapper.style.display = 'grid';
            emptyMsg.style.display = 'none';
            container.innerHTML = '';

            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p>${item.price} ر.س</p>
                    </div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="updateQty(${index}, -1)"><i class="fas fa-minus"></i></button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQty(${index}, 1)"><i class="fas fa-plus"></i></button>
                    </div>
                    <div style="width: 100px; text-align: center; font-weight: bold;">
                        ${itemTotal} ر.س
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash-alt"></i></button>
                `;
                container.appendChild(div);
            });

            document.getElementById('subtotal').innerText = total + ' ر.س';
            document.getElementById('final-total').innerText = total + ' ر.س';
        }

        function updateQty(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            localStorage.setItem('perfume_cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
        }

        function removeItem(index) {
            // الرسالة المحسنة 2: تأكيد الحذف من السلة
            showCustomMessage({
                title: "هل أنت متأكد؟",
                message: `هل ترغب حقاً في إزالة "<strong>${cart[index].name}</strong>" من سلة المشتريات؟ قد تنفد الكمية المتوفرة قريباً!`,
                icon: "🗑️",
                type: "confirm",
                onConfirm: () => {
                    cart.splice(index, 1);
                    localStorage.setItem('perfume_cart', JSON.stringify(cart));
                    renderCart();
                    updateCartCount();
                }
            });
        }

        window.onload = renderCart;
    </script>
</body>
</html>
