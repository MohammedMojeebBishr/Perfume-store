<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الشراء - متجر عَبق الفخامة</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }
        
        .checkout-form, .order-summary {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        
        .payment-methods {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .payment-card {
            border: 2px solid #eee;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .payment-card img {
            height: 30px;
        }
        
        .payment-card.active {
            border-color: var(--primary-color);
            background: rgba(176, 141, 87, 0.05);
        }
        
        .order-summary h3 {
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .total-row {
            border-top: 2px solid var(--light-bg);
            padding-top: 15px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .confirm-btn {
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            font-size: 1.1rem;
        }
        
        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <h1>عَبق الفخامة</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="products.html">العطور</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="contact.html">اتصل بنا</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">إتمام عملية الشراء</h2>
        
        <form id="checkout-form" onsubmit="return handleCheckout(event)">
            <div class="checkout-grid">
                <!-- بيانات الشحن -->
                <div class="checkout-form">
                    <h3>بيانات الشحن</h3>
                    <div class="form-group">
                        <label>الاسم الكامل *</label>
                        <input type="text" id="fullname" required placeholder="أدخل اسمك بالكامل">
                    </div>
                    <div class="form-group">
                        <label>رقم الجوال *</label>
                        <input type="tel" id="phone" required placeholder="05xxxxxxxx">
                    </div>
                    <div class="form-group">
                        <label>العنوان بالتفصيل *</label>
                        <input type="text" id="address" required placeholder="المدينة، الحي، اسم الشارع">
                    </div>
                    
                    <h3 style="margin-top: 30px;">طريقة الدفع</h3>
                    <div class="payment-methods">
                        <div class="payment-card active" onclick="selectPayment(this)">
                            <img src="assets/images/payment_methods.png" alt="Visa/Mastercard">
                            <span>بطاقة ائتمان</span>
                        </div>
                        <div class="payment-card" onclick="selectPayment(this)">
                            <i class="fas fa-money-bill-wave fa-2x" style="color: #2ecc71;"></i>
                            <span>الدفع عند الاستلام</span>
                        </div>
                    </div>
                    
                    <div id="card-details" style="margin-top: 20px;">
                        <div class="form-group">
                            <label>رقم البطاقة</label>
                            <input type="text" placeholder="xxxx xxxx xxxx xxxx">
                        </div>
                        <div style="display: flex; gap: 15px;">
                            <div class="form-group" style="flex: 1;">
                                <label>تاريخ الانتهاء</label>
                                <input type="text" placeholder="MM/YY">
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label>CVV</label>
                                <input type="text" placeholder="xxx">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- ملخص الطلب -->
                <div class="order-summary">
                    <h3>ملخص الطلب</h3>
                    <div id="order-items">
                        <!-- سيتم تحميل المنتجات هنا -->
                    </div>
                    
                    <div class="summary-item">
                        <span>قيمة المنتجات</span>
                        <span id="subtotal">0 ر.س</span>
                    </div>
                    <div class="summary-item">
                        <span>رسوم الشحن</span>
                        <span>مجاني</span>
                    </div>
                    <div class="summary-item total-row">
                        <span>الإجمالي</span>
                        <span id="final-total">0 ر.س</span>
                    </div>
                    
                    <button type="submit" class="btn confirm-btn">تأكيد الطلب والدفع</button>
                </div>
            </div>
        </form>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>جميع الحقوق محفوظة &copy; 2024 متجر عَبق الفخامة</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        function renderOrderSummary() {
            const container = document.getElementById('order-items');
            const subtotalEl = document.getElementById('subtotal');
            const finalTotalEl = document.getElementById('final-total');
            
            if (cart.length === 0) {
                window.location.href = 'products.html';
                return;
            }
            
            let total = 0;
            container.innerHTML = '';
            
            cart.forEach(item => {
                total += item.price * item.quantity;
                const div = document.createElement('div');
                div.className = 'summary-item';
                div.innerHTML = `
                    <span>${item.name} (x${item.quantity})</span>
                    <span>${item.price * item.quantity} ر.س</span>
                `;
                container.appendChild(div);
            });
            
            subtotalEl.innerText = `${total} ر.س`;
            finalTotalEl.innerText = `${total} ر.س`;
        }

        function selectPayment(element) {
            document.querySelectorAll('.payment-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            const cardDetails = document.getElementById('card-details');
            if (element.innerText.includes('بطاقة')) {
                cardDetails.style.display = 'block';
            } else {
                cardDetails.style.display = 'none';
            }
        }

        function handleCheckout(event) {
            event.preventDefault();
            
            // التحقق من ملء جميع البيانات
            const name = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            
            if (!name || !phone || !address) {
                showCustomMessage({
                    title: "بيانات ناقصة",
                    message: "لطفاً، تأكد من إكمال كافة البيانات المطلوبة لنتمكن من خدمتك بشكل أفضل.",
                    icon: "📝"
                });
                return false;
            }
            
            // محاكاة إتمام الطلب بنجاح
            // الرسالة المحسنة 3: استلام الطلب بنجاح
            showCustomMessage({
                title: "تم استلام طلبك بنجاح!",
                message: "تهانينا! لقد بدأنا بتجهيز طلبك بكل عناية واهتمام. سيتواصل معك فريق التوصيل قريباً لتنسيق الموعد الأنسب لك. شكراً لاختيارك <strong>باريس للعطور</strong> ليكون جزءاً من أناقتك!",
                icon: "🎊",
                onConfirm: () => {
                    localStorage.removeItem('perfume_cart');
                    window.location.href = 'index.html';
                }
            });
            return false;
        }

        window.onload = renderOrderSummary;
    </script>
</body>
</html>
